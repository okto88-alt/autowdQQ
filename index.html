<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AutoWD Panel QQ</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg:       #0A0E1A;
  --surface:  #111827;
  --border:   #1F2937;
  --accent:   #3B82F6;
  --accent2:  #10B981;
  --danger:   #EF4444;
  --warn:     #F59E0B;
  --text:     #F9FAFB;
  --muted:    #6B7280;
  --success:  #10B981;
  --mono:     'JetBrains Mono', monospace;
  --sans:     'Syne', sans-serif;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { background:var(--bg); color:var(--text); font-family:var(--sans); min-height:100vh; display:flex; flex-direction:column; }

/* ── TOPBAR ── */
.topbar {
  display:flex; align-items:center; justify-content:space-between;
  padding:14px 24px; background:var(--surface);
  border-bottom:1px solid var(--border); position:sticky; top:0; z-index:100;
}
.brand { display:flex; align-items:center; gap:10px; }
.brand-dot { width:10px; height:10px; border-radius:50%; background:var(--accent); animation:pulse 2s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
.brand h1 { font-size:16px; font-weight:800; letter-spacing:0.5px; }
.brand span { color:var(--accent); }
.conn-status { display:flex; align-items:center; gap:8px; font-size:12px; font-family:var(--mono); }
.conn-dot { width:8px; height:8px; border-radius:50%; background:var(--danger); transition:background 0.3s; }
.conn-dot.connected { background:var(--success); }
.stats-bar { display:flex; gap:20px; }
.stat { text-align:center; }
.stat-val { font-size:18px; font-weight:800; font-family:var(--mono); color:var(--accent); }
.stat-lbl { font-size:10px; color:var(--muted); letter-spacing:1px; text-transform:uppercase; }

/* ── LAYOUT ── */
.layout { display:grid; grid-template-columns:300px 1fr; flex:1; overflow:hidden; height:calc(100vh - 57px); }

/* ── SIDEBAR ── */
.sidebar {
  background:var(--surface); border-right:1px solid var(--border);
  display:flex; flex-direction:column; overflow-y:auto; padding:16px;
}
.sidebar-section { margin-bottom:20px; }
.sidebar-label {
  font-size:10px; font-weight:700; letter-spacing:1.5px; text-transform:uppercase;
  color:var(--muted); margin-bottom:10px; padding-bottom:6px;
  border-bottom:1px solid var(--border);
}

/* ── AGENT CONNECT ── */
.agent-input { display:flex; gap:6px; margin-bottom:8px; }
.agent-input input {
  flex:1; background:#0A0E1A; border:1px solid var(--border); border-radius:8px;
  color:var(--text); padding:8px 12px; font-family:var(--mono); font-size:12px;
  outline:none; transition:border 0.2s;
}
.agent-input input:focus { border-color:var(--accent); }
.agent-input input::placeholder { color:var(--muted); }

/* ── BUTTONS ── */
.btn {
  padding:9px 16px; border-radius:8px; border:none; cursor:pointer;
  font-family:var(--sans); font-size:13px; font-weight:600;
  transition:all 0.15s; white-space:nowrap;
}
.btn-primary { background:var(--accent); color:#fff; }
.btn-primary:hover { background:#2563EB; }
.btn-success { background:var(--success); color:#fff; }
.btn-success:hover { background:#059669; }
.btn-danger  { background:var(--danger); color:#fff; }
.btn-danger:hover  { background:#DC2626; }
.btn-ghost   { background:transparent; color:var(--muted); border:1px solid var(--border); }
.btn-ghost:hover   { border-color:var(--accent); color:var(--accent); }
.btn-warn    { background:var(--warn); color:#000; }
.btn-warn:hover    { background:#D97706; }
.btn:disabled { opacity:0.4; cursor:not-allowed; }
.btn-full { width:100%; margin-bottom:6px; }
.btn-row { display:flex; gap:6px; }
.btn-row .btn { flex:1; }

/* ── DEVICE LIST ── */
.device-list { margin-bottom:10px; }
.device-item {
  display:flex; align-items:center; justify-content:space-between;
  padding:8px 12px; background:#0A0E1A; border-radius:8px;
  margin-bottom:4px; cursor:pointer; border:1px solid transparent;
  transition:all 0.15s;
}
.device-item:hover { border-color:var(--accent); }
.device-item.selected { border-color:var(--accent); background:#1E3A5F22; }
.device-name { font-size:12px; font-family:var(--mono); }
.device-serial { font-size:10px; color:var(--muted); }

/* ── PASTE AREA ── */
.paste-area {
  width:100%; background:#0A0E1A; border:1px solid var(--border); border-radius:8px;
  color:var(--text); padding:10px; font-family:var(--mono); font-size:11px;
  resize:vertical; min-height:100px; outline:none; transition:border 0.2s;
}
.paste-area:focus { border-color:var(--accent); }

/* ── MAIN CONTENT ── */
.main { display:flex; flex-direction:column; overflow:hidden; }
.tabs { display:flex; border-bottom:1px solid var(--border); background:var(--surface); }
.tab {
  padding:12px 24px; font-size:13px; font-weight:600; cursor:pointer;
  border-bottom:2px solid transparent; color:var(--muted); transition:all 0.15s;
}
.tab.active { color:var(--accent); border-bottom-color:var(--accent); }
.tab-content { flex:1; overflow:hidden; display:none; }
.tab-content.active { display:flex; flex-direction:column; }

/* ── QUEUE TABLE ── */
.queue-container { flex:1; overflow-y:auto; padding:16px; }
.queue-empty {
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  height:200px; color:var(--muted);
}
.queue-empty-icon { font-size:40px; margin-bottom:12px; opacity:0.3; }
.tbl-header {
  display:grid;
  grid-template-columns:90px 40px 100px 1fr 120px 80px 110px 130px 120px;
  gap:4px; padding:8px 12px; background:var(--surface);
  border-radius:8px 8px 0 0; border:1px solid var(--border);
  font-size:10px; font-weight:700; letter-spacing:1px;
  text-transform:uppercase; color:var(--muted);
}
.tbl-row {
  display:grid;
  grid-template-columns:90px 40px 100px 1fr 120px 80px 110px 130px 120px;
  gap:4px; padding:10px 12px;
  border:1px solid var(--border); border-top:none;
  background:#0A0E1A; transition:background 0.1s; align-items:center;
}
.tbl-row:last-child { border-radius:0 0 8px 8px; }
.tbl-row:hover { background:#111827; }
.badge {
  display:inline-flex; align-items:center; justify-content:center;
  padding:3px 8px; border-radius:20px; font-size:10px; font-weight:700;
  font-family:var(--mono); letter-spacing:0.5px;
}
.badge-pending    { background:#422006; color:#FCD34D; }
.badge-processing { background:#1E3A5F; color:#93C5FD; }
.badge-success    { background:#064E3B; color:#6EE7B7; cursor:pointer; }
.badge-failed     { background:#450A0A; color:#FCA5A5; }
.badge-skipped    { background:#1F2937; color:#9CA3AF; }
.bank-tag {
  padding:2px 8px; border-radius:4px; font-size:10px; font-weight:700;
  font-family:var(--mono);
}
.bank-BCA     { background:#1E3A5F; color:#60A5FA; }
.bank-DANA    { background:#0C4A6E; color:#38BDF8; }
.bank-GOPAY   { background:#064E3B; color:#34D399; }
.bank-OVO     { background:#2E1065; color:#C084FC; }
.bank-LINKAJA { background:#450A0A; color:#FCA5A5; }
.cell { font-size:12px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.cell-mono { font-family:var(--mono); }
.cell-name { font-weight:600; }
.cell-amount { font-weight:700; color:var(--accent); font-family:var(--mono); }
.cell-date { font-size:11px; color:var(--muted); font-family:var(--mono); }
.actions-cell { display:flex; gap:4px; align-items:center; }
.btn-xs {
  padding:4px 8px; font-size:10px; border-radius:6px; border:none; cursor:pointer;
  font-weight:700; font-family:var(--sans); transition:all 0.1s;
}
.btn-xs-danger  { background:#450A0A; color:#FCA5A5; }
.btn-xs-danger:hover  { background:var(--danger); color:#fff; }
.btn-xs-retry   { background:#422006; color:#FCD34D; }
.btn-xs-retry:hover   { background:var(--warn); color:#000; }

/* ── LOG PANEL ── */
.log-panel {
  height:200px; background:#050810; border-top:1px solid var(--border);
  display:flex; flex-direction:column;
}
.log-header {
  display:flex; align-items:center; justify-content:space-between;
  padding:8px 16px; border-bottom:1px solid var(--border);
}
.log-header span { font-size:11px; font-weight:700; letter-spacing:1px; text-transform:uppercase; color:var(--muted); }
.log-body { flex:1; overflow-y:auto; padding:8px 16px; font-family:var(--mono); font-size:11px; line-height:1.7; }
.log-line { display:flex; gap:8px; }
.log-ts   { color:var(--muted); flex-shrink:0; }
.log-msg  { flex:1; }
.log-info    { color:#E2E8F0; }
.log-success { color:var(--success); }
.log-error   { color:var(--danger); }
.log-warn    { color:var(--warn); }

/* ── MODAL ── */
.modal-overlay {
  position:fixed; inset:0; background:rgba(0,0,0,0.8); z-index:1000;
  display:flex; align-items:center; justify-content:center;
  opacity:0; pointer-events:none; transition:opacity 0.2s;
}
.modal-overlay.open { opacity:1; pointer-events:all; }
.modal {
  background:var(--surface); border:1px solid var(--border); border-radius:16px;
  padding:28px; width:480px; max-width:95vw;
  transform:scale(0.95); transition:transform 0.2s;
}
.modal-overlay.open .modal { transform:scale(1); }
.modal h2 { font-size:18px; font-weight:800; margin-bottom:20px; }
.form-group { margin-bottom:16px; }
.form-label { font-size:12px; color:var(--muted); margin-bottom:6px; display:block; letter-spacing:0.5px; }
.form-input {
  width:100%; background:#0A0E1A; border:1px solid var(--border); border-radius:8px;
  color:var(--text); padding:10px 14px; font-family:var(--mono); font-size:13px;
  outline:none; transition:border 0.2s;
}
.form-input:focus { border-color:var(--accent); }
.modal-footer { display:flex; gap:8px; justify-content:flex-end; margin-top:20px; }

/* ── SCROLLBAR ── */
::-webkit-scrollbar { width:4px; height:4px; }
::-webkit-scrollbar-track { background:transparent; }
::-webkit-scrollbar-thumb { background:var(--border); border-radius:2px; }
</style>
</head>
<body>

<!-- TOPBAR -->
<div class="topbar">
  <div class="brand">
    <div class="brand-dot" id="connDot"></div>
    <h1>AutoWD <span>Panel QQ</span></h1>
  </div>
  <div class="stats-bar">
    <div class="stat"><div class="stat-val" id="statPending">0</div><div class="stat-lbl">Pending</div></div>
    <div class="stat"><div class="stat-val" id="statSuccess" style="color:var(--success)">0</div><div class="stat-lbl">Sukses</div></div>
    <div class="stat"><div class="stat-val" id="statFailed" style="color:var(--danger)">0</div><div class="stat-lbl">Gagal</div></div>
  </div>
  <div class="conn-status">
    <div class="conn-dot" id="connIndicator"></div>
    <span id="connLabel">Disconnected</span>
  </div>
</div>

<!-- MAIN LAYOUT -->
<div class="layout">

  <!-- SIDEBAR -->
  <div class="sidebar">

    <!-- Agent Connect -->
    <div class="sidebar-section">
      <div class="sidebar-label">Agent Connection</div>
      <div class="agent-input">
        <input type="text" id="agentUrl" placeholder="ws://192.168.1.x:8765" value="">
      </div>
      <div class="btn-row">
        <button class="btn btn-primary" onclick="connectAgent()">Connect</button>
        <button class="btn btn-ghost" onclick="disconnectAgent()">Disconnect</button>
      </div>
    </div>

    <!-- Devices -->
    <div class="sidebar-section">
      <div class="sidebar-label">Device HP</div>
      <div id="deviceList" class="device-list">
        <div style="font-size:12px;color:var(--muted);text-align:center;padding:12px">
          Connect agent dulu
        </div>
      </div>
      <button class="btn btn-ghost btn-full" onclick="scanDevices()" id="btnScan" disabled>🔍 Scan Device</button>
    </div>

    <!-- Paste BO -->
    <div class="sidebar-section">
      <div class="sidebar-label">Paste Data BO</div>
      <textarea class="paste-area" id="pasteArea" placeholder="Copy tabel dari panel BO lalu paste di sini..."></textarea>
      <div style="height:8px"></div>
      <button class="btn btn-success btn-full" onclick="addToQueue()" id="btnAdd" disabled>+ Tambah ke Queue</button>
    </div>

    <!-- Process -->
    <div class="sidebar-section">
      <div class="sidebar-label">Proses</div>
      <button class="btn btn-primary btn-full" onclick="startProcess()" id="btnStart" disabled>▶ Start</button>
      <button class="btn btn-danger btn-full" onclick="stopProcess()" id="btnStop" disabled>■ Stop</button>
      <button class="btn btn-ghost btn-full" onclick="clearDone()">🗑 Hapus Selesai</button>
    </div>

    <!-- Settings -->
    <div class="sidebar-section">
      <div class="sidebar-label">Pengaturan</div>
      <button class="btn btn-ghost btn-full" onclick="openSettings()">⚙ Settings</button>
    </div>

  </div>

  <!-- MAIN CONTENT -->
  <div class="main">
    <div class="tabs">
      <div class="tab active" onclick="switchTab('queue')">Queue</div>
      <div class="tab" onclick="switchTab('history')">History</div>
    </div>

    <!-- QUEUE TAB -->
    <div class="tab-content active" id="tab-queue">
      <div class="queue-container" id="queueContainer">
        <div class="queue-empty">
          <div class="queue-empty-icon">📋</div>
          <div>Queue kosong. Paste data BO untuk mulai.</div>
        </div>
      </div>
    </div>

    <!-- HISTORY TAB -->
    <div class="tab-content" id="tab-history">
      <div class="queue-container" id="historyContainer">
        <div class="queue-empty">
          <div class="queue-empty-icon">📜</div>
          <div>Belum ada history.</div>
        </div>
      </div>
    </div>

    <!-- LOG PANEL -->
    <div class="log-panel">
      <div class="log-header">
        <span>Log</span>
        <button class="btn btn-ghost" style="padding:3px 10px;font-size:11px" onclick="clearLog()">Clear</button>
      </div>
      <div class="log-body" id="logBody"></div>
    </div>
  </div>
</div>

<!-- SETTINGS MODAL -->
<div class="modal-overlay" id="settingsModal">
  <div class="modal">
    <h2>Settings</h2>
    <div class="form-group">
      <label class="form-label">BCA Password</label>
      <input type="password" class="form-input" id="inputPassword" placeholder="Password login myBCA">
    </div>
    <div class="form-group">
      <label class="form-label">PIN myBCA (6 digit)</label>
      <input type="password" class="form-input" id="inputPin" placeholder="PIN transaksi" maxlength="6">
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeSettings()">Batal</button>
      <button class="btn btn-primary" onclick="saveSettings()">Simpan</button>
    </div>
  </div>
</div>

<script>
// ── STATE ─────────────────────────────────────
let ws = null;
let queue = [];
let selectedDevice = null;
let isRunning = false;

// ── WEBSOCKET ─────────────────────────────────
function connectAgent() {
  const url = document.getElementById('agentUrl').value.trim() || 'ws://localhost:8765';
  if (ws) ws.close();

  addLog('Menghubungkan ke agent: ' + url, 'info');
  ws = new WebSocket(url);

  ws.onopen = () => {
    setConnected(true);
    addLog('Terhubung ke agent!', 'success');
    enableButtons(true);
    scanDevices();
  };

  ws.onmessage = (e) => {
    try { handleMessage(JSON.parse(e.data)); } catch {}
  };

  ws.onclose = () => {
    setConnected(false);
    addLog('Koneksi agent terputus', 'warn');
    enableButtons(false);
  };

  ws.onerror = () => {
    addLog('Gagal terhubung ke agent. Pastikan agent.exe sudah berjalan.', 'error');
  };
}

function disconnectAgent() {
  if (ws) { ws.close(); ws = null; }
}

function send(data) {
  if (ws && ws.readyState === WebSocket.OPEN) {
    ws.send(JSON.stringify(data));
  }
}

function handleMessage(msg) {
  switch (msg.type) {
    case 'init':
      queue = msg.queue || [];
      renderQueue();
      addLog('Agent v' + (msg.version || '?') + ' terhubung', 'success');
      break;

    case 'log':
      addLog(msg.msg, msg.level || 'info');
      break;

    case 'devices':
      renderDevices(msg.devices || []);
      break;

    case 'connect_result':
      if (msg.ok) {
        addLog('Device terhubung: ' + msg.serial, 'success');
        document.getElementById('btnStart').disabled = false;
        document.getElementById('btnAdd').disabled = false;
      } else {
        addLog('Gagal connect device', 'error');
      }
      break;

    case 'queue_updated':
      queue = msg.queue || [];
      renderQueue();
      updateStats();
      if (msg.added !== undefined) {
        addLog(`Ditambahkan ${msg.added} item` + (msg.dupes ? ` (${msg.dupes} duplikat dilewati)` : ''), 'success');
      }
      break;

    case 'status_update':
      updateItemStatus(msg.raw_key, msg.status);
      updateStats();
      break;

    case 'process_started':
      isRunning = true;
      document.getElementById('btnStart').disabled = true;
      document.getElementById('btnStop').disabled = false;
      addLog('Proses dimulai...', 'info');
      break;

    case 'process_done':
      isRunning = false;
      document.getElementById('btnStart').disabled = false;
      document.getElementById('btnStop').disabled = true;
      addLog('Proses selesai!', 'success');
      updateStats();
      break;

    case 'process_stopped':
      isRunning = false;
      document.getElementById('btnStart').disabled = false;
      document.getElementById('btnStop').disabled = true;
      break;

    case 'settings_saved':
      addLog('Settings tersimpan', 'success');
      closeSettings();
      break;

    case 'xpath_reloaded':
      addLog(`XPath config di-reload: ${msg.count} entries`, 'success');
      break;

    case 'error':
      addLog('ERROR: ' + msg.msg, 'error');
      break;
  }
}

// ── DEVICES ───────────────────────────────────
function scanDevices() {
  send({ action: 'scan_devices' });
  addLog('Scanning devices...', 'info');
}

function renderDevices(devices) {
  const el = document.getElementById('deviceList');
  if (!devices.length) {
    el.innerHTML = '<div style="font-size:12px;color:var(--muted);text-align:center;padding:12px">Tidak ada HP terdeteksi</div>';
    return;
  }
  el.innerHTML = devices.map(d => `
    <div class="device-item" onclick="connectDevice('${d.serial}', this)">
      <div>
        <div class="device-name">${d.name}</div>
        <div class="device-serial">${d.serial}</div>
      </div>
      <span style="font-size:10px;color:var(--muted)">tap</span>
    </div>
  `).join('');
}

function connectDevice(serial, el) {
  document.querySelectorAll('.device-item').forEach(d => d.classList.remove('selected'));
  el.classList.add('selected');
  selectedDevice = serial;
  send({ action: 'connect_device', serial });
  addLog('Connecting ke ' + serial + '...', 'info');
}

// ── QUEUE ─────────────────────────────────────
function addToQueue() {
  const raw = document.getElementById('pasteArea').value.trim();
  if (!raw) return;
  send({ action: 'parse_and_add', raw });
  // Fallback: kirim raw ke agent, agent yang parse
  // Tapi karena parse ada di agent.py, kita kirim raw text
  // Agent punya parse_bo_table yang sama
  // Untuk panel web, kita parse di JS atau kirim ke agent
  addLog('Memproses data BO...', 'info');
  // Untuk sekarang kirim ke agent untuk di-parse
  send({ action: 'parse_bo', text: raw });
  document.getElementById('pasteArea').value = '';
}

function renderQueue() {
  const el = document.getElementById('queueContainer');
  if (!queue.length) {
    el.innerHTML = '<div class="queue-empty"><div class="queue-empty-icon">📋</div><div>Queue kosong. Paste data BO untuk mulai.</div></div>';
    return;
  }

  const header = `
    <div class="tbl-header">
      <div>Status</div><div>#</div><div>Tiket</div>
      <div>Nama</div><div>Rekening</div><div>Bank</div>
      <div>Nominal</div><div>Tanggal</div><div>Aksi</div>
    </div>`;

  const rows = queue.map((item, i) => {
    const status = item.status || 'pending';
    const bankClass = 'bank-' + (item.bank || 'BCA');
    const nominal = parseInt(item.nominal || 0).toLocaleString('id-ID');
    const doneAt = item.done_at || '';
    const dateColor = status === 'success' ? 'var(--success)' : status === 'failed' ? 'var(--danger)' : 'var(--muted)';

    const retryBtn = status === 'failed'
      ? `<button class="btn-xs btn-xs-retry" onclick="retryItem('${item.raw_key}')">↺</button>` : '';
    const canDel = ['pending','failed','skipped'].includes(status);
    const delBtn = canDel
      ? `<button class="btn-xs btn-xs-danger" onclick="deleteItem('${item.raw_key}')">✕</button>` : '';

    return `
      <div class="tbl-row" id="row-${item.raw_key}">
        <div><span class="badge badge-${status}" ${status==='success'?'title="Klik untuk lihat screenshot"':''}>${status.toUpperCase()}</span></div>
        <div class="cell cell-mono" style="color:var(--muted)">${i+1}</div>
        <div class="cell cell-mono" style="color:var(--muted)">${item.tiket||''}</div>
        <div class="cell cell-name">${item.nama||''}</div>
        <div class="cell cell-mono" style="font-size:11px">${item.rekening||''}</div>
        <div><span class="bank-tag ${bankClass}">${item.bank||'BCA'}</span></div>
        <div class="cell cell-amount">IDR ${nominal}</div>
        <div class="cell cell-date" style="color:${dateColor}">${doneAt}</div>
        <div class="actions-cell">${retryBtn}${delBtn}</div>
      </div>`;
  }).join('');

  el.innerHTML = header + rows;
}

function updateItemStatus(rawKey, status) {
  for (let item of queue) {
    if (item.raw_key === rawKey) {
      item.status = status;
      if (['success','failed'].includes(status) && !item.done_at) {
        item.done_at = new Date().toLocaleString('id-ID');
      }
      break;
    }
  }
  // Update badge saja tanpa re-render full
  const row = document.getElementById('row-' + rawKey);
  if (row) {
    const badge = row.querySelector('.badge');
    if (badge) {
      badge.className = 'badge badge-' + status;
      badge.textContent = status.toUpperCase();
    }
  }
}

function deleteItem(rawKey) {
  send({ action: 'delete_item', raw_key: rawKey });
}

function retryItem(rawKey) {
  send({ action: 'retry_item', raw_key: rawKey });
}

function clearDone() {
  send({ action: 'clear_done' });
}

// ── PROCESS ───────────────────────────────────
function startProcess() {
  const pending = queue.filter(i => i.status === 'pending');
  if (!pending.length) { addLog('Tidak ada item pending', 'warn'); return; }
  send({ action: 'start' });
}

function stopProcess() {
  send({ action: 'stop' });
}

// ── STATS ─────────────────────────────────────
function updateStats() {
  const cnt = {pending:0, success:0, failed:0};
  for (const item of queue) {
    const s = item.status || 'pending';
    if (s in cnt) cnt[s]++;
  }
  document.getElementById('statPending').textContent = cnt.pending;
  document.getElementById('statSuccess').textContent = cnt.success;
  document.getElementById('statFailed').textContent  = cnt.failed;
}

// ── LOG ───────────────────────────────────────
function addLog(msg, level='info') {
  const el = document.getElementById('logBody');
  const now = new Date().toLocaleTimeString('id-ID');
  const line = document.createElement('div');
  line.className = 'log-line';
  line.innerHTML = `<span class="log-ts">${now}</span><span class="log-msg log-${level}">${msg}</span>`;
  el.appendChild(line);
  // Auto-trim
  while (el.children.length > 500) el.removeChild(el.firstChild);
  el.scrollTop = el.scrollHeight;
}

function clearLog() {
  document.getElementById('logBody').innerHTML = '';
}

// ── SETTINGS ──────────────────────────────────
function openSettings() {
  document.getElementById('settingsModal').classList.add('open');
}

function closeSettings() {
  document.getElementById('settingsModal').classList.remove('open');
  document.getElementById('inputPin').value = '';
}

function saveSettings() {
  const password = document.getElementById('inputPassword').value;
  const pin      = document.getElementById('inputPin').value;
  if (pin && (!/^\d{6}$/.test(pin))) {
    addLog('PIN harus 6 digit angka', 'error');
    return;
  }
  send({ action: 'save_settings', password, pin });
}

// ── TABS ──────────────────────────────────────
function switchTab(name) {
  document.querySelectorAll('.tab').forEach((t,i) => {
    t.classList.toggle('active', ['queue','history'][i] === name);
  });
  document.querySelectorAll('.tab-content').forEach(t => {
    t.classList.toggle('active', t.id === 'tab-' + name);
  });
}

// ── UI HELPERS ────────────────────────────────
function setConnected(ok) {
  document.getElementById('connDot').style.animation = ok ? 'pulse 2s infinite' : 'none';
  document.getElementById('connDot').style.background = ok ? 'var(--accent)' : 'var(--danger)';
  document.getElementById('connIndicator').classList.toggle('connected', ok);
  document.getElementById('connLabel').textContent = ok ? 'Connected' : 'Disconnected';
}

function enableButtons(ok) {
  document.getElementById('btnScan').disabled = !ok;
  if (!ok) {
    document.getElementById('btnStart').disabled = true;
    document.getElementById('btnStop').disabled = true;
    document.getElementById('btnAdd').disabled = true;
  }
}

// ── AUTO-CONNECT ──────────────────────────────
window.addEventListener('load', () => {
  const saved = localStorage.getItem('agentUrl');
  if (saved) {
    document.getElementById('agentUrl').value = saved;
  }
  updateStats();
});

document.getElementById('agentUrl').addEventListener('change', (e) => {
  localStorage.setItem('agentUrl', e.target.value);
});

// Close modal on overlay click
document.getElementById('settingsModal').addEventListener('click', function(e) {
  if (e.target === this) closeSettings();
});
</script>
</body>
</html>
